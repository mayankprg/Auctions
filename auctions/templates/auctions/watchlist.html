{% extends "auctions/layout.html" %}
{% load static %}

{% block body %}
    <h2>Watch List</h2>
    
    {% for listing in watchList %}

        <p>{{listing.title}}</p>
        <form action="{% url 'removelisting' listing.id %}" method="POST">
            {% csrf_token %}
            <input type="submit" value="Remove">
        </form>
    {% endfor %}


{% endblock %}
